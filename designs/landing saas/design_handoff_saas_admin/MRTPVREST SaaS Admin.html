<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRTPVREST · SaaS Admin</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Extra font pairs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Font pair helpers — applied via data-font on body */
    body[data-font="halo"] {
      --f-display: 'Syne', system-ui, sans-serif;
      --f-body:    'DM Sans', system-ui, sans-serif;
      --f-mono:    'DM Mono', ui-monospace, monospace;
    }
    body[data-font="editorial"] {
      --f-display: 'Bricolage Grotesque', system-ui, sans-serif;
      --f-body:    'Bricolage Grotesque', system-ui, sans-serif;
      --f-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body[data-font="jakarta"] {
      --f-display: 'Plus Jakarta Sans', system-ui, sans-serif;
      --f-body:    'Plus Jakarta Sans', system-ui, sans-serif;
      --f-mono:    'JetBrains Mono', ui-monospace, monospace;
    }
    /* editorial mood: tighter spacing, bolder headings */
    body[data-font="editorial"] .display,
    body[data-font="editorial"] .tb-title,
    body[data-font="editorial"] .page-head-left h2,
    body[data-font="editorial"] .card-h h3,
    body[data-font="editorial"] .kpi-val,
    body[data-font="editorial"] h2,
    body[data-font="editorial"] h3 {
      letter-spacing: -0.03em;
      font-weight: 800;
    }
    /* jakarta: slightly rounder, more breathing room */
    body[data-font="jakarta"] .kpi-val,
    body[data-font="jakarta"] .page-head-left h2,
    body[data-font="jakarta"] .tb-title {
      font-weight: 700;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body data-mode="dark" data-mood="linear" data-density="normal">
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Mock data (plain JS, runs first) -->
  <script src="data.js"></script>

  <!-- React modules (Babel-transpiled, run in order) -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="ai-panel.jsx"></script>
  <script type="text/babel" src="screen-overview.jsx"></script>
  <script type="text/babel" src="screen-marcas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
