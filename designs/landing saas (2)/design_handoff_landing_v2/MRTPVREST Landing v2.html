<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRTPVREST — ¿Cuánto ganaste ayer en tu restaurante?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="saas-admin/tweaks-panel.jsx"></script>
<style>
/* image slot overrides */
image-slot { display: block; }
.testi-slot image-slot { width: 44px; height: 44px; flex-shrink: 0; }
.action-slot-lg image-slot { width: 100%; height: 100%; }
</style>
<style>
:root {
  --iris-300:#b89eff;--iris-400:#9472ff;--iris-500:#7c3aed;--iris-600:#6428d0;
  --iris-soft:rgba(124,58,237,.14);--iris-glow:rgba(124,58,237,.35);
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;--info:#3b82f6;
  --ok-soft:rgba(16,185,129,.14);--warn-soft:rgba(245,158,11,.14);
  --bg:#08080f;--surf-1:#0f0f1c;--surf-2:#15152a;--surf-3:#1c1c38;
  --bd-1:rgba(255,255,255,.08);--bd-2:rgba(255,255,255,.14);
  --tx:#f4f4fb;--tx-hi:#fff;--tx-mid:#c4c4de;--tx-mut:#9494b8;--tx-dim:#6e6e92;
  --f-d:'Syne',system-ui,sans-serif;
  --f-b:'DM Sans',system-ui,sans-serif;
  --f-m:'DM Mono',ui-monospace,monospace;
}
/* font variants */
body[data-font="bricolage"] { --f-d:'Bricolage Grotesque',system-ui,sans-serif; --f-b:'Bricolage Grotesque',system-ui,sans-serif; }
body[data-font="jakarta"]   { --f-d:'Plus Jakarta Sans',system-ui,sans-serif;   --f-b:'Plus Jakarta Sans',system-ui,sans-serif;   --f-m:'JetBrains Mono',monospace; }
body[data-font="space"]     { --f-d:'Space Grotesk',system-ui,sans-serif;       --f-b:'Space Grotesk',system-ui,sans-serif;       --f-m:'Space Mono',monospace; }
body[data-font="manrope"]   { --f-d:'Manrope',system-ui,sans-serif;             --f-b:'Manrope',system-ui,sans-serif;             --f-m:'JetBrains Mono',monospace; }

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:var(--f-b);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::selection{background:var(--iris-soft);color:var(--iris-300);}

/* reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease;}
.reveal.visible{opacity:1;transform:none;}
.rd1{transition-delay:.08s;}.rd2{transition-delay:.16s;}.rd3{transition-delay:.24s;}.rd4{transition-delay:.32s;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,15,.9);border-bottom:1px solid var(--bd-1);backdrop-filter:blur(16px);}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--iris-400),var(--iris-600));display:grid;place-items:center;font-family:var(--f-d);font-weight:800;font-size:14px;color:#fff;box-shadow:0 4px 12px var(--iris-glow);}
.brand-name{font-family:var(--f-d);font-weight:800;font-size:15px;color:var(--tx-hi);}
.nav-mid{display:flex;gap:2px;}
.nav-link{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--tx-mut);cursor:pointer;border:none;background:transparent;font-family:var(--f-b);transition:background .12s,color .12s;}
.nav-link:hover{background:var(--surf-2);color:var(--tx);}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-login{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--tx-mid);background:transparent;border:1px solid var(--bd-1);cursor:pointer;font-family:var(--f-b);transition:background .12s;}
.nav-login:hover{background:var(--surf-1);}
.nav-cta{padding:8px 18px;border-radius:9px;background:var(--iris-500);color:#fff;font-weight:700;font-size:13px;font-family:var(--f-b);border:none;cursor:pointer;box-shadow:0 4px 16px var(--iris-glow);transition:background .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.nav-cta:hover{background:var(--iris-400);}

/* ── HERO ── */
.hero{position:relative;padding:72px 32px 80px;text-align:center;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.o1{width:700px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.18),transparent 70%);top:-100px;left:50%;transform:translateX(-50%);}
.o2{width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,.08),transparent 70%);bottom:0;right:0;}
.hero-inner{position:relative;z-index:1;max-width:760px;margin:0 auto;}

.eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--surf-1);border:1px solid var(--bd-2);border-radius:999px;padding:5px 14px;margin-bottom:24px;animation:fup .5s ease-out both;}
.eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:blink 2.4s infinite;}
.eyebrow span{font-family:var(--f-m);font-size:11px;color:var(--tx-mid);letter-spacing:.08em;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.hero h1{font-family:var(--f-d);font-weight:800;font-size:clamp(36px,5.5vw,72px);line-height:1.06;color:var(--tx-hi);letter-spacing:-.04em;margin-bottom:20px;animation:fup .6s .1s ease-out both;}
.hero h1 .pain{display:block;background:linear-gradient(90deg,var(--tx-hi),var(--tx-mid));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero h1 .answer{display:block;background:linear-gradient(90deg,var(--iris-300),#ec4899,var(--iris-400));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.hero-sub{font-size:17px;color:var(--tx-mut);max-width:540px;margin:0 auto 20px;line-height:1.75;animation:fup .6s .2s ease-out both;}

/* Social proof line */
.mini-proof{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;animation:fup .6s .25s ease-out both;}
.mini-avatars{display:flex;}
.mini-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg);margin-left:-8px;font-size:12px;display:grid;place-items:center;background:var(--surf-2);}
.mini-av:first-child{margin-left:0;}
.mini-proof-text{font-size:12.5px;color:var(--tx-dim);}
.mini-proof-text strong{color:var(--tx-mid);}
.stars{color:#f59e0b;letter-spacing:-1px;font-size:13px;}

.hero-actions{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;animation:fup .6s .3s ease-out both;}
.btn-primary{padding:14px 28px;border-radius:11px;background:var(--iris-500);color:#fff;font-weight:700;font-size:15px;font-family:var(--f-b);border:none;cursor:pointer;box-shadow:0 4px 24px var(--iris-glow),inset 0 0 0 1px rgba(255,255,255,.08);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{background:var(--iris-400);transform:translateY(-1px);box-shadow:0 8px 32px var(--iris-glow);}
.btn-video{padding:14px 24px;border-radius:11px;background:var(--surf-1);color:var(--tx-mid);font-size:14px;font-weight:600;font-family:var(--f-b);border:1px solid var(--bd-2);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-video:hover{background:var(--surf-2);color:var(--tx);}
.play-circle{width:28px;height:28px;border-radius:50%;background:var(--iris-soft);border:1px solid rgba(124,58,237,.3);display:grid;place-items:center;flex-shrink:0;}

.trust-strip{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:18px;flex-wrap:wrap;animation:fup .6s .4s ease-out both;}
.trust-item{display:flex;align-items:center;gap:5px;font-family:var(--f-m);font-size:10.5px;color:var(--tx-dim);letter-spacing:.04em;}
.trust-item::before{content:'✓';color:var(--ok);font-weight:700;}

/* ── VIDEO SECTION ── */
.video-section{padding:0 32px 72px;max-width:900px;margin:0 auto;}
.video-frame{
  position:relative;border-radius:20px;overflow:hidden;
  background:var(--surf-1);border:1px solid var(--bd-2);
  box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 60px rgba(124,58,237,.1);
  cursor:pointer;
}
.video-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#0c0c20,#1a1535);}
.video-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;}
.video-overlay{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;}
.play-btn{width:72px;height:72px;border-radius:50%;background:var(--iris-500);display:grid;place-items:center;box-shadow:0 8px 32px var(--iris-glow),0 0 0 12px rgba(124,58,237,.12);transition:transform .2s,box-shadow .2s;font-size:24px;}
.video-frame:hover .play-btn{transform:scale(1.08);box-shadow:0 12px 40px var(--iris-glow),0 0 0 16px rgba(124,58,237,.1);}
.video-tag{font-family:var(--f-m);font-size:11px;color:var(--tx-mid);letter-spacing:.1em;background:rgba(8,8,15,.7);padding:5px 12px;border-radius:999px;border:1px solid var(--bd-1);backdrop-filter:blur(8px);}
.video-bar{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bd-1);}
.video-bar-l{display:flex;align-items:center;gap:10px;}
.video-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);}

/* ── PAIN SECTION ── */
.pain-section{padding:64px 32px;background:linear-gradient(180deg,transparent,rgba(239,68,68,.03) 50%,transparent);}
.pain-inner{max-width:1000px;margin:0 auto;}
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;}
.pain-card{background:var(--surf-1);border:1px solid var(--bd-1);border-radius:16px;padding:24px;position:relative;overflow:hidden;}
.pain-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--err);opacity:.4;}
.pain-bad{font-size:14px;color:var(--tx-mut);margin-bottom:14px;padding-bottom:14px;border-bottom:1px dashed var(--bd-1);line-height:1.6;}
.pain-bad .x{color:var(--err);font-weight:700;display:block;margin-bottom:4px;font-size:13px;font-family:var(--f-m);}
.pain-good{font-size:14px;color:var(--tx-mid);line-height:1.6;}
.pain-good .check{color:var(--ok);font-weight:700;display:block;margin-bottom:4px;font-size:13px;font-family:var(--f-m);}

/* ── APPS ── */
.apps-section{padding:64px 32px;max-width:1200px;margin:0 auto;}
.apps-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.app-card{border-radius:16px;overflow:hidden;cursor:pointer;display:block;line-height:0;position:relative;border:1px solid var(--bd-1);transition:transform .25s,box-shadow .25s;}
.app-card img{width:100%;height:auto;display:block;transition:transform .4s;}
.app-card:hover{transform:translateY(-4px);}
.app-card:hover img{transform:scale(1.02);}
.app-label{position:absolute;bottom:12px;left:12px;background:rgba(8,8,15,.75);backdrop-filter:blur(8px);border:1px solid var(--bd-1);border-radius:8px;padding:5px 10px;font-family:var(--f-m);font-size:10px;font-weight:600;color:var(--tx-mid);letter-spacing:.08em;opacity:0;transition:opacity .2s;}
.app-card:hover .app-label{opacity:1;}
.app-card.glow-ok:hover{box-shadow:0 12px 40px rgba(16,185,129,.25);}
.app-card.glow-iris:hover{box-shadow:0 12px 40px rgba(124,58,237,.3);}
.app-card.glow-am:hover{box-shadow:0 12px 40px rgba(245,158,11,.25);}
.app-card.glow-err:hover{box-shadow:0 12px 40px rgba(239,68,68,.25);}
.app-card.glow-info:hover{box-shadow:0 12px 40px rgba(59,130,246,.25);}
.app-card.glow-pu:hover{box-shadow:0 12px 40px rgba(168,85,247,.3);}

/* ── HOW IT WORKS ── */
.how-section{padding:64px 32px;max-width:900px;margin:0 auto;text-align:center;}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px;position:relative;}
.steps::before{content:'';position:absolute;top:28px;left:calc(33% + 20px);right:calc(33% + 20px);height:1px;background:linear-gradient(90deg,var(--iris-soft),var(--iris-400),var(--iris-soft));}
.step{display:flex;flex-direction:column;align-items:center;gap:12px;}
.step-num{width:56px;height:56px;border-radius:16px;background:var(--iris-soft);border:1px solid rgba(124,58,237,.3);display:grid;place-items:center;font-family:var(--f-d);font-weight:800;font-size:20px;color:var(--iris-400);position:relative;z-index:1;}
.step h3{font-family:var(--f-d);font-weight:700;font-size:15px;color:var(--tx-hi);}
.step p{font-size:13px;color:var(--tx-mut);line-height:1.6;}

/* ── TESTIMONIALS ── */
.testimonials-section{padding:64px 32px;background:radial-gradient(ellipse 900px 400px at 50% 50%,rgba(124,58,237,.05),transparent 70%);}
.testimonials-inner{max-width:1000px;margin:0 auto;}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;}
.testi-card{background:var(--surf-1);border:1px solid var(--bd-1);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:14px;transition:border-color .2s;}
.testi-card:hover{border-color:var(--bd-2);}
.testi-stars{color:#f59e0b;font-size:13px;letter-spacing:0;}
.testi-quote{font-size:14px;color:var(--tx-mid);line-height:1.7;font-style:italic;flex:1;}
.testi-quote::before{content:'"';font-family:var(--f-d);font-size:28px;color:var(--iris-400);line-height:1;display:block;margin-bottom:4px;}
.testi-author{display:flex;align-items:center;gap:10px;}
.testi-av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;}
.testi-name{font-weight:600;font-size:13px;color:var(--tx);}
.testi-biz{font-family:var(--f-m);font-size:10px;color:var(--tx-dim);margin-top:2px;}

/* ── PRICING ── */
.pricing-section{padding:64px 32px;max-width:1000px;margin:0 auto;}
.bill-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:36px;}
.bill-tgl{display:flex;background:var(--surf-1);border:1px solid var(--bd-1);border-radius:9px;padding:3px;}
.bill-btn{padding:6px 14px;border-radius:6px;font-family:var(--f-b);font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--tx-dim);transition:all .15s;}
.bill-btn.active{background:var(--surf-2);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.save-pill{background:var(--ok-soft);color:var(--ok);border:1px solid rgba(16,185,129,.2);padding:3px 9px;border-radius:999px;font-family:var(--f-m);font-size:9.5px;font-weight:700;}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.plan{background:var(--surf-1);border:1px solid var(--bd-1);border-radius:18px;padding:26px 22px;position:relative;transition:transform .2s,box-shadow .2s;}
.plan:hover{transform:translateY(-3px);}
.plan.feat{background:linear-gradient(180deg,rgba(124,58,237,.08),var(--surf-1) 60%);border-color:rgba(124,58,237,.35);box-shadow:0 8px 40px rgba(124,58,237,.1);}
.plan.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--iris-400),transparent);}
.plan-pop{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--iris-500);color:#fff;font-family:var(--f-m);font-size:9px;font-weight:700;padding:3px 12px;border-radius:999px;letter-spacing:.1em;white-space:nowrap;box-shadow:0 4px 12px var(--iris-glow);}
.plan-tier{font-family:var(--f-m);font-size:9.5px;font-weight:600;letter-spacing:.18em;color:var(--tx-dim);text-transform:uppercase;margin-bottom:8px;}
.plan-price-block{margin-bottom:6px;}
.plan-usd{display:flex;align-items:baseline;gap:3px;font-family:var(--f-d);font-weight:800;font-size:40px;color:var(--tx-hi);letter-spacing:-.03em;}
.plan-usd sup{font-size:18px;font-weight:600;color:var(--tx-mid);}
.plan-usd span{font-family:var(--f-b);font-size:13px;font-weight:400;color:var(--tx-dim);}
.plan-local{font-family:var(--f-m);font-size:11px;color:var(--tx-dim);margin-top:2px;}
.plan-desc{font-size:13px;color:var(--tx-mut);margin:12px 0 20px;line-height:1.55;}
.plan-btn{width:100%;padding:11px;border-radius:10px;font-family:var(--f-b);font-size:13.5px;font-weight:700;cursor:pointer;border:1px solid var(--bd-2);background:var(--surf-2);color:var(--tx);transition:all .15s;margin-bottom:20px;}
.plan-btn:hover{background:var(--surf-3);}
.plan-btn.f{background:var(--iris-500);color:#fff;border-color:var(--iris-500);box-shadow:0 4px 16px var(--iris-glow);}
.plan-btn.f:hover{background:var(--iris-400);}
.plan-divider{height:1px;background:var(--bd-1);margin-bottom:16px;}
.plan-feat-list{display:flex;flex-direction:column;gap:8px;}
.feat-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx-mid);}
.feat-row .ck{color:var(--ok);font-weight:700;font-size:12px;flex-shrink:0;}
.feat-row.off{color:var(--tx-dim);}
.feat-row.off .ck{color:var(--tx-dim);}
.plan-trial-note{font-family:var(--f-m);font-size:10px;color:var(--ok);text-align:center;margin-top:14px;}

/* ── FAQ ── */
.faq-section{padding:64px 32px;max-width:680px;margin:0 auto;}
.faq-item{border-bottom:1px solid var(--bd-1);overflow:hidden;}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:18px 4px;cursor:pointer;gap:12px;}
.faq-q h4{font-size:14.5px;font-weight:600;color:var(--tx);line-height:1.4;}
.faq-icon{width:24px;height:24px;border-radius:6px;background:var(--surf-2);border:1px solid var(--bd-1);display:grid;place-items:center;flex-shrink:0;font-size:14px;color:var(--tx-dim);transition:transform .2s;}
.faq-icon.open{transform:rotate(45deg);}
.faq-a{font-size:13.5px;color:var(--tx-mut);line-height:1.75;padding:0 4px 18px;max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .2s;opacity:0;}
.faq-a.open{max-height:200px;opacity:1;}

/* ── FINAL CTA ── */
.cta-section{padding:96px 32px;text-align:center;background:radial-gradient(ellipse 700px 350px at 50% 100%,rgba(124,58,237,.18),transparent 70%);border-top:1px solid var(--bd-1);}
.cta-section h2{font-family:var(--f-d);font-weight:800;font-size:clamp(28px,4vw,52px);color:var(--tx-hi);letter-spacing:-.04em;line-height:1.06;margin-bottom:14px;}
.cta-section h2 em{font-style:normal;background:linear-gradient(90deg,var(--iris-300),#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cta-section p{font-size:16px;color:var(--tx-mut);max-width:420px;margin:0 auto 32px;line-height:1.7;}
.cta-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

function useReveal() {
  React.useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    setTimeout(() => {
      document.querySelectorAll('.reveal').forEach(el => {
        obs.observe(el);
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight) el.classList.add('visible');
      });
    }, 60);
    return () => obs.disconnect();
  }, []);
}
