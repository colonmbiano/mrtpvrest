import groovy.json.JsonSlurper

apply plugin: 'com.android.application'

def getAppVersionInfo() {
    def baseDir = projectDir.parentFile.parentFile
    def packageJsonFile = file("${baseDir}/package.json")
    def versionName = "0.1.0"
    def versionCode = 1
    if (packageJsonFile.exists()) {
        try {
            def parsedJson = new JsonSlurper().parseText(packageJsonFile.text)
            def pkgVersion = parsedJson.version ?: "0.1.0"
            def versionParts = pkgVersion.split('\\.')
            def majorMinor = versionParts.length >= 2 ? "${versionParts[0]}.${versionParts[1]}" : "0.1"
            def patch = "0"
            try {
                def stdout = new ByteArrayOutputStream()
                exec {
                    commandLine 'git', 'rev-list', '--count', 'HEAD', '--', baseDir.absolutePath
                    standardOutput = stdout
                    ignoreExitValue = true
                }
                def count = stdout.toString().trim()
                if (!count.isEmpty()) {
                    patch = count
                    versionCode = count.toInteger()
                }
            } catch (Exception gitEx) {
                // Fallback si falla git
            }
            versionName = "${majorMinor}.${patch}"
        } catch (Exception ex) {
            // Fallback si falla el parseo
        }
    }
    return [code: versionCode, name: versionName]
}

def appVersion = getAppVersionInfo()

android {
    namespace = "com.mrtpvrest.delivery"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.mrtpvrest.delivery"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersion.code
        versionName appVersion.name
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Firma de release — keystore desde env (CI/GitHub Secrets):
    //   KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
    // o gradle.properties locales (MRTPV_*). Sin keystore, assembleRelease queda
    // sin firma (intencional: no shipear builds sin firmar). Mismo patrón que apps/tpv.
    signingConfigs {
        release {
            def ksPath = System.getenv("KEYSTORE_PATH") ?: project.findProperty("MRTPV_KEYSTORE_PATH")
            def ksPassword = System.getenv("KEYSTORE_PASSWORD") ?: project.findProperty("MRTPV_KEYSTORE_PASSWORD")
            def alias = System.getenv("KEY_ALIAS") ?: project.findProperty("MRTPV_KEY_ALIAS")
            def keyPass = System.getenv("KEY_PASSWORD") ?: project.findProperty("MRTPV_KEY_PASSWORD")

            if (ksPath && file(ksPath).exists() && ksPassword && alias && keyPass) {
                storeFile file(ksPath)
                storePassword ksPassword
                keyAlias alias
                keyPassword keyPass
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'

            // Solo firmar si hay keystore; si no, assembleRelease queda sin firma.
            def cfg = signingConfigs.release
            if (cfg.storeFile != null) {
                signingConfig cfg
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
