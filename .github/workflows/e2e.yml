name: E2E — Playwright (Turno → Orden → KDS → Cobro)

# Gate en PRs a master desde 2026-06-12 (secrets configurados + seed con
# empleados E2E). Los push directos a master NO se gatean — trade-off del
# flujo de push directo; correr workflow_dispatch tras cambios grandes.
#
# El ARD §10 pide que los E2E sean BLOQUEANTES del merge a master. Esta
# infraestructura levanta todo lo necesario (Postgres efímero, migraciones,
# seed, backend + admin + tpv) y corre Playwright. Para volverlo un gate real:
#
#   1. Configurar los secrets del repo (Settings → Secrets → Actions):
#        SEED_ADMIN_EMAIL / SEED_ADMIN_PASSWORD
#        SUPERADMIN_EMAIL / SUPERADMIN_PASSWORD
#      y exponer PINs deterministas de empleados (WAITER_PIN, CASHIER_PIN,
#      KITCHEN_PIN) — requiere que el seed cree esos empleados con PIN fijo.
#   2. Verificar que el seed genere los empleados que esperan 04/06 specs.
#   3. Cambiar el trigger a `pull_request` y marcarlo como required check en
#      la branch protection de master.
#
# Mientras tanto se ejecuta manualmente (workflow_dispatch) para validar.

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). Los jobs que
# necesiten escribir lo declaran a nivel de job (p.ej. el commit de APKs).
permissions:
  contents: read

on:
  workflow_dispatch: {}
  pull_request:
    branches: [master]
    paths:
      - "apps/backend/**"
      - "apps/tpv/**"
      - "apps/admin/**"
      - "apps/saas/**"
      - "apps/kds/**"
      - "packages/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/mrtpvrest_test"
  JWT_SECRET: "ci-e2e-jwt-secret-please-override"
  JWT_REFRESH_SECRET: "ci-e2e-refresh-secret-please-override"
  TENANT_GUARD_MODE: "enforce"
  NODE_ENV: "test"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mrtpvrest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        # v6 lee la versión de pnpm desde "packageManager" en package.json
        # (pnpm@9.15.0). Pasar "version" además causaría ERR_PNPM_BAD_PM_VERSION.

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente Prisma
        run: pnpm --filter @mrtpvrest/database run db:generate

      - name: Migrar BD
        run: pnpm --filter @mrtpvrest/database run db:migrate

      - name: Seed de datos
        run: pnpm --filter @mrtpvrest/database run db:seed
        env:
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          # PINs deterministas: el seed crea los empleados E2E con estos
          # valores y los specs (06-role-security) loguean con los mismos.
          WAITER_PIN: ${{ secrets.WAITER_PIN }}
          CASHIER_PIN: ${{ secrets.CASHIER_PIN }}
          KITCHEN_PIN: ${{ secrets.KITCHEN_PIN }}

      - name: Instalar navegadores Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Arrancar backend
        run: pnpm --filter @mrtpvrest/backend start > backend.log 2>&1 &
        env:
          PORT: "3001"
          # La suite hace >10 logins por PIN desde la misma IP+location;
          # sin esto el rate limiter (10/15min) tira 429 a mitad de corrida.
          PIN_LOGIN_RATE_MAX: "1000"

      - name: Arrancar admin + tpv + saas + kds
        run: |
          pnpm --filter @mrtpvrest/admin dev > admin.log 2>&1 &
          pnpm --filter @mrtpvrest/tpv dev > tpv.log 2>&1 &
          pnpm --filter @mrtpvrest/saas dev > saas.log 2>&1 &
          pnpm --filter @mrtpvrest/kds dev > kds.log 2>&1 &
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

      - name: Esperar a los servicios
        # El KDS web sirve bajo basePath /kds (la raíz :3009/ es 404)
        run: pnpm dlx wait-on@8.0.1 -t 120000 http://localhost:3001/health http://localhost:3002 http://localhost:3004 http://localhost:3005 http://localhost:3009/kds/

      - name: Logs del backend (pre-tests)
        run: tail -40 backend.log || true

      - name: Correr E2E
        run: pnpm test:e2e
        env:
          ADMIN_URL: "http://localhost:3002"
          TPV_URL: "http://localhost:3005"
          SAAS_URL: "http://localhost:3004"
          KDS_URL: "http://localhost:3009/kds/"
          ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          WAITER_PIN: ${{ secrets.WAITER_PIN }}
          CASHIER_PIN: ${{ secrets.CASHIER_PIN }}
          KITCHEN_PIN: ${{ secrets.KITCHEN_PIN }}

      - name: Logs del backend (post-tests)
        if: always()
        run: tail -120 backend.log || true

      - name: Logs de las apps Next (solo si falló)
        if: failure()
        run: |
          for f in admin.log tpv.log saas.log kds.log; do
            echo "::group::$f"; tail -60 "$f" || true; echo "::endgroup::"
          done

      - name: Subir reporte HTML + traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          # El reporter html escribe en tests/e2e-report y los traces/
          # screenshots/videos de fallos en tests/e2e/results (outputDir).
          path: |
            tests/e2e-report
            tests/e2e/results
          retention-days: 14
          if-no-files-found: ignore
