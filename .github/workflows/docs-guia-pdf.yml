name: Docs — Regenerar guía en PDF

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). El job que
# commitea el PDF regenerado eleva a contents: write más abajo.
permissions:
  contents: read

on:
  push:
    branches: [master]
    # Solo cuando cambia la fuente de la guía o sus capturas. El PDF de salida
    # (docs/pdf/**) NO está en los paths ⇒ el commit de vuelta no re-dispara.
    paths:
      - "docs/guia-usuario.md"
      - "docs/img/guia/**"
      - "scripts/build-guia-pdf.js"
  workflow_dispatch:

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  build-pdf:
    name: Generar y commitear PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write # necesario para commitear el PDF regenerado a master

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        # v6 lee la versión de pnpm desde "packageManager" en package.json.

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Instalar Chromium (Playwright)
        run: pnpm exec playwright install --with-deps chromium

      - name: Regenerar guía en PDF
        run: pnpm docs:guia-pdf

      - name: Commitear PDF si cambió
        run: |
          if git diff --quiet -- docs/pdf/guia-usuario.pdf; then
            echo "Sin cambios en el PDF; nada que commitear."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pdf/guia-usuario.pdf
          git commit -m "docs: regenerar guía de usuario en PDF [skip ci]"
          git push
