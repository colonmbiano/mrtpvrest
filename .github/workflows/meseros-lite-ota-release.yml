name: Meseros Lite OTA Release

# Auto-publica un nuevo bundle live-update de Meseros Lite (Capacitor) cada vez
# que se pushean cambios al directorio apps/meseros-lite/ en master. También se
# puede lanzar manualmente desde la UI del SaaS (botón → /api/ota/trigger-build
# → workflow_dispatch).
#
# Versionado:
#   - MAJOR.MINOR vienen de apps/meseros-lite/package.json
#   - PATCH = cuenta de commits del repo que tocaron apps/meseros-lite/
#   Resultado monotónico (ej. 0.1.16) sin necesidad de commit-back. Coincide con
#   el versionName que calcula apps/meseros-lite/android/app/build.gradle, así
#   que el primer bundle iguala al baked-in del APK y los siguientes lo superan.
#
# Secrets requeridos:
#   OTA_PUBLISH_TOKEN o OTA_BUILD_SECRET. OTA_PUBLISH_TOKEN es preferido.

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). Los jobs que
# necesiten escribir lo declaran a nivel de job.
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'apps/meseros-lite/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      channel:
        description: Canal de release
        type: choice
        options: [production, beta, dev]
        default: production
      notes:
        description: Notas del release (opcional)
        required: false

concurrency:
  group: meseros-lite-ota-release-${{ github.event.inputs.channel || 'production' }}
  cancel-in-progress: false

jobs:
  release:
    name: Build + publish OTA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (full history para git rev-list)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Compute version (major.minor desde package.json + patch=commits)
        id: ver
        run: |
          MAJOR_MINOR=$(node -p "require('./apps/meseros-lite/package.json').version.split('.').slice(0,2).join('.')")
          PATCH=$(git rev-list --count HEAD -- apps/meseros-lite/)
          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Meseros Lite OTA version=$VERSION"

      - name: Build Meseros Lite (Next static export para Capacitor)
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_API_URL: https://api.mrtpvrest.com
        run: pnpm --filter @mrtpvrest/meseros-lite build

      - name: Zip out/
        run: |
          cd apps/meseros-lite
          zip -qr /tmp/bundle.zip out/
          ls -lh /tmp/bundle.zip

      - name: Resolver canal y notas
        id: meta
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          [ -z "$CHANNEL" ] && CHANNEL="production"
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then
            # En push automático, usa el subject del commit como notes.
            NOTES=$(git log -1 --pretty=%s)
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Publish a /api/ota/publish
        env:
          OTA_PUBLISH_TOKEN: ${{ secrets.OTA_PUBLISH_TOKEN }}
          OTA_BUILD_SECRET: ${{ secrets.OTA_BUILD_SECRET }}
        run: |
          set -o pipefail
          HEADER_NAME=""
          HEADER_VALUE=""
          if [ -n "$OTA_PUBLISH_TOKEN" ]; then
            HEADER_NAME="Authorization"
            HEADER_VALUE="Bearer $OTA_PUBLISH_TOKEN"
          elif [ -n "$OTA_BUILD_SECRET" ]; then
            HEADER_NAME="X-OTA-Build-Token"
            HEADER_VALUE="$OTA_BUILD_SECRET"
          else
            echo "::error::Falta OTA_PUBLISH_TOKEN u OTA_BUILD_SECRET en Settings ? Secrets ? Actions."
            exit 1
          fi
          curl -fsSL -X POST https://api.mrtpvrest.com/api/ota/publish \
            -H "$HEADER_NAME: $HEADER_VALUE" \
            -F "appId=com.mrtpvrest.meseroslite" \
            -F "version=${{ steps.ver.outputs.version }}" \
            -F "channel=${{ steps.meta.outputs.channel }}" \
            --form-string "notes=${{ steps.meta.outputs.notes }}" \
            -F "bundle=@/tmp/bundle.zip" \
            | tee /tmp/publish.json
          echo "::notice::Publicado v${{ steps.ver.outputs.version }} en canal ${{ steps.meta.outputs.channel }}"
