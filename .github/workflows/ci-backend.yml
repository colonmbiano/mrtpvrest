name: CI — Backend Test (dinero + tenant guard)

# Gate de calidad para el backend. Corre en cada PR/push que toque el backend o
# los paquetes compartidos. Cubre la lógica PURA crítica (money.js: totales,
# variantes, modificadores, corte de caja) y el aislamiento multi-tenant
# (tenant-guard). NO necesita BD: los tests mockean Prisma o prueban funciones
# puras. Ver ARD §10.

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). Los jobs que
# necesiten escribir lo declaran a nivel de job (p.ej. el commit de APKs).
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "apps/backend/**"
      - "packages/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/backend/**"
      - "packages/**"
      - ".github/workflows/ci-backend.yml"

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  test:
    name: Jest + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # v6 lee la versión de pnpm desde "packageManager" en package.json
        # (pnpm@9.15.0). Pasar "version" además causaría ERR_PNPM_BAD_PM_VERSION.

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # Algunos módulos requieren el cliente Prisma generado al cargar.
      - name: Generar cliente Prisma
        run: pnpm --filter @mrtpvrest/database run db:generate

      - name: Pruebas unitarias + cobertura
        run: pnpm --filter @mrtpvrest/backend run test:coverage --ci
