name: CI — MRTPV Retail Lint & Types

# GITHUB_TOKEN de solo lectura por defecto (least-privilege).
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "apps/moda/**"
      - "packages/**"
  pull_request:
    branches: [master]
    paths:
      - "apps/moda/**"
      - "packages/**"

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  lint-types:
    name: Lint + Types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        # v6 lee la versión de pnpm desde "packageManager" en package.json.

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # El TPV de retail vive casi entero en src/app/page.jsx, que es JS: tsc no
      # lo mira, así que ESLint es lo ÚNICO que verifica ahí que un identificador
      # exista. Sin este paso, un hook usado sin importar llega a producción.
      - name: Lint
        run: pnpm --filter @mrtpvrest/moda run lint

      - name: Typecheck
        run: pnpm --filter @mrtpvrest/moda run type-check

      # El build no se repite aquí: Vercel ya compila la app en cada PR y
      # duplicarlo solo alarga el CI sin cubrir nada nuevo.
