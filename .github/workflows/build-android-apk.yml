name: Build Android APK (TPV)

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). Los jobs que
# necesiten escribir lo declaran a nivel de job (p.ej. el commit de APKs).
permissions:
  contents: read

on:
  push:
    branches: [master, main]
    paths:
      - "apps/tpv/**"
      - ".github/workflows/build-android-apk.yml"
  pull_request:
    paths:
      - "apps/tpv/**"
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Build Next.js static export + Capacitor sync
        working-directory: apps/tpv
        run: pnpm run build:apk
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_API_URL: https://api.mrtpvrest.com

      - name: Gradle cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/tpv/android/**/*.gradle*', 'apps/tpv/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: apps/tpv/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tpv-debug-apk-${{ github.sha }}
          path: apps/tpv/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
