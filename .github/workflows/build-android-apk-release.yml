name: Build Android APK Release (TPV)

# Genera un APK de release firmado del TPV. Sólo se dispara manualmente o
# en push a tags `tpv-v*` para no inflar el CI con cada commit a master.
# Requiere los siguientes GitHub Secrets para producir un APK firmado:
#   KEYSTORE_BASE64    — keystore .jks codificado base64
#   KEYSTORE_PASSWORD  — contraseña del store
#   KEY_ALIAS          — alias de la llave
#   KEY_PASSWORD       — contraseña de la llave
#
# Si los secrets no están presentes, el job falla en el paso "Decode" para
# evitar publicar APKs sin firmar.

# GITHUB_TOKEN de solo lectura por defecto (least-privilege). Los jobs que
# necesiten escribir lo declaran a nivel de job (p.ej. el commit de APKs).
permissions:
  contents: read

on:
  push:
    tags:
      - 'tpv-v*'
  workflow_dispatch: {}

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Build Next.js static export + Capacitor sync
        working-directory: apps/tpv
        run: pnpm run build:apk
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_API_URL: https://api.mrtpvrest.com

      - name: Gradle cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/tpv/android/**/*.gradle*', 'apps/tpv/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Falta el secret KEYSTORE_BASE64. No es seguro publicar APKs sin firmar."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > apps/tpv/android/app/tpv-release.jks
          ls -lh apps/tpv/android/app/tpv-release.jks

      - name: Build release APK & AAB
        working-directory: apps/tpv/android
        env:
          # Ruta ABSOLUTA: build.gradle la resuelve con file() relativo al
          # módulo app — una relativa tipo "app/tpv-release.jks" apuntaba a
          # android/app/app/… y la firma quedaba vacía (APK unsigned).
          KEYSTORE_PATH: ${{ github.workspace }}/apps/tpv/android/app/tpv-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload signed release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tpv-release-apk-${{ github.sha }}
          path: apps/tpv/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload signed release AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tpv-release-aab-${{ github.sha }}
          path: apps/tpv/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Cleanup keystore
        if: always()
        run: rm -f apps/tpv/android/app/tpv-release.jks
