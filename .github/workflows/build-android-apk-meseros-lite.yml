name: Build Android APK (Meseros Lite)

on:
  push:
    branches: [master, main]
    paths:
      - "apps/meseros-lite/**"
      - ".github/workflows/build-android-apk-meseros-lite.yml"
  pull_request:
    paths:
      - "apps/meseros-lite/**"
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build debug APK Meseros Lite
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Next.js static export + Capacitor sync
        working-directory: apps/meseros-lite
        run: pnpm run build:apk
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_API_URL: https://api.mrtpvrest.com

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-meseros-lite-${{ hashFiles('apps/meseros-lite/android/**/*.gradle*', 'apps/meseros-lite/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: apps/meseros-lite/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meseros-lite-debug-apk-${{ github.sha }}
          path: apps/meseros-lite/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
